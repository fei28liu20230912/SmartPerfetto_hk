# =============================================================================
# 音视频同步偏差分析（原子 Skill）v1.0
# =============================================================================
# TV 场景核心 Skill：检测音视频时间戳偏差，定位音画不同步问题。
# 支持三种检测方法：
# - ESD (Expected Signal Delay) — Android 13+ 原生支持
# - PTS 对比 — 通用方法，从 slice 推算
# - Present Fence vs Audio Timestamp — 最精确，需要 audio trace
#
# 数据源依赖：trace 需包含 audio + video atrace category

name: av_sync_skew
version: "1.0"
type: atomic
category: tv_media
tier: A

meta:
  display_name: "音视频同步偏差"
  description: "检测 A/V Sync 偏差，定位音画不同步，TV 场景专用"
  icon: "sync"
  tags: [tv, av_sync, audio, video, skew, lipsync, atomic]

triggers:
  keywords:
    zh: [音画不同步, 音视频同步, A/V同步, 声画不同步, 嘴型不对, AV同步, 音频延迟]
    en: [av sync, audio video sync, lipsync, lip sync, audio lag, video lag]
  patterns:
    - ".*(音画|声画|音视频|A/V).*(同步|不同步|偏差|延迟).*"
    - ".*(av sync|lipsync|lip sync|audio video).*(lag|drift|skew).*"

prerequisites:
  required_tables:
    - slice
    - counter
    - counter_track
  modules:
    - counters.intervals

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB）"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"
  - name: skew_threshold_ms
    type: number
    required: false
    description: "偏差告警阈值(ms)，默认 15（大部分用户可感知阈值）"

steps:
  # Step 1: AudioFlinger 活动 + Underrun 检测
  - id: audio_underrun_detection
    type: atomic
    name: "音频 Underrun 检测"
    display:
      level: summary
      layer: overview
      title: "AudioFlinger Underrun 检测"
      columns:
        - name: track_name
          label: "Track"
          type: string
        - name: underrun_count
          label: "Underrun次数"
          type: number
        - name: total_duration_sec
          label: "分析时长(秒)"
          type: number
        - name: underrun_rate
          label: "Underrun率(/秒)"
          type: number
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts
      ),
      underrun_counters AS (
        SELECT
          t.name AS track_name,
          c.ts,
          c.value
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        CROSS JOIN input i
        WHERE (t.name GLOB '*underrun*' OR t.name GLOB '*Underrun*')
          AND c.ts >= i.start_ts
          AND c.ts < i.end_ts
      ),
      with_delta AS (
        SELECT
          track_name,
          ts,
          value,
          value - LAG(value) OVER (PARTITION BY track_name ORDER BY ts) AS delta
        FROM underrun_counters
      )
      SELECT
        track_name,
        CAST(COALESCE(SUM(CASE WHEN delta > 0 THEN delta ELSE 0 END), 0) AS INTEGER) AS underrun_count,
        ROUND((SELECT (end_ts - start_ts) / 1e9 FROM input), 2) AS total_duration_sec,
        ROUND(
          COALESCE(SUM(CASE WHEN delta > 0 THEN delta ELSE 0 END), 0)
          / NULLIF((SELECT (end_ts - start_ts) / 1e9 FROM input), 0),
          4
        ) AS underrun_rate
      FROM with_delta
      GROUP BY track_name
    save_as: audio_underrun_status

  # Step 2: Video 解码 + 释放延迟分析
  - id: video_decode_release_timing
    type: atomic
    name: "视频帧释放时序"
    display:
      level: detail
      layer: list
      title: "视频帧释放时序"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
        - name: slice_name
          label: "Slice"
          type: string
        - name: process_name
          label: "进程"
          type: string
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${package|}', ''), '') AS target_process,
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts
      ),
      video_slices AS (
        SELECT
          s.ts,
          s.dur,
          s.name AS slice_name,
          p.name AS process_name,
          ROUND(s.dur / 1e6, 2) AS dur_ms
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
          AND s.ts >= i.start_ts
          AND s.ts < i.end_ts
          AND s.dur > 0
          AND (
            s.name GLOB '*releaseOutputBuffer*' OR
            s.name GLOB '*dequeueOutputBuffer*' OR
            s.name GLOB '*queueInputBuffer*' OR
            s.name GLOB '*onOutputBufferDone*'
          )
      )
      SELECT
        printf('%d', ts) AS ts,
        dur_ms,
        slice_name,
        process_name
      FROM video_slices
      ORDER BY ts
      LIMIT 200
    save_as: video_release_timing

  # Step 3: A/V Sync 偏差检测（基于 slice 时间戳对比）
  - id: av_skew_detection
    type: atomic
    name: "A/V Sync 偏差检测"
    display:
      level: detail
      layer: list
      title: "音视频同步偏差"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: video_ts_ms
          label: "视频时间"
          type: number
        - name: audio_ts_ms
          label: "音频时间"
          type: number
        - name: skew_ms
          label: "偏差(ms)"
          type: number
        - name: severity
          label: "严重度"
          type: string
        - name: note
          label: "说明"
          type: string
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts,
          COALESCE(${skew_threshold_ms}, 15) AS skew_threshold_ms
      ),
      -- 视频帧释放事件（代表视频帧到达 SurfaceFlinger 的时间）
      video_events AS (
        SELECT
          s.ts,
          s.dur,
          p.name AS process_name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE s.ts >= i.start_ts AND s.ts < i.end_ts
          AND s.dur > 0
          AND s.name GLOB '*releaseOutputBuffer*'
      ),
      -- 音频写入事件（代表音频帧到达 AudioFlinger 的时间）
      audio_events AS (
        SELECT
          s.ts,
          s.dur,
          p.name AS process_name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE s.ts >= i.start_ts AND s.ts < i.end_ts
          AND s.dur > 0
          AND (
            s.name GLOB '*AudioTrack*write*' OR
            s.name GLOB '*AudioTrack.write*'
          )
      ),
      -- 10ms 窗口内配对视频和音频事件
      paired AS (
        SELECT
          v.ts AS video_ts,
          a.ts AS audio_ts,
          (v.ts - a.ts) / 1e6 AS skew_ms,
          v.process_name
        FROM video_events v
        LEFT JOIN audio_events a
          ON ABS(v.ts - a.ts) < 10000000
          AND v.process_name = a.process_name
        WHERE v.process_name IS NOT NULL
      ),
      with_severity AS (
        SELECT
          video_ts,
          audio_ts,
          skew_ms,
          process_name,
          CASE
            WHEN ABS(skew_ms) < 5 THEN '正常'
            WHEN ABS(skew_ms) < 15 THEN '轻微'
            WHEN ABS(skew_ms) < 45 THEN '明显'
            ELSE '严重'
          END AS severity,
          CASE
            WHEN skew_ms > 45 THEN '视频严重超前音频'
            WHEN skew_ms > 15 THEN '视频超前音频'
            WHEN skew_ms > 5 THEN '视频略超前'
            WHEN skew_ms < -45 THEN '音频严重超前视频'
            WHEN skew_ms < -15 THEN '音频超前视频'
            WHEN skew_ms < -5 THEN '音频略超前'
            ELSE '同步良好'
          END AS note
        FROM paired
      )
      SELECT
        printf('%d', video_ts) AS ts,
        ROUND(video_ts / 1e6, 2) AS video_ts_ms,
        ROUND(audio_ts / 1e6, 2) AS audio_ts_ms,
        ROUND(skew_ms, 2) AS skew_ms,
        severity,
        note
      FROM with_severity
      WHERE severity != '正常'
      ORDER BY ABS(skew_ms) DESC
      LIMIT 100
    save_as: av_skew_events

  # Step 4: A/V Sync 偏差趋势统计
  - id: av_skew_summary
    type: atomic
    name: "A/V Sync 偏差趋势"
    display:
      level: summary
      layer: overview
      title: "音视频同步偏差统计"
      columns:
        - name: metric
          label: "指标"
          type: string
        - name: value_ms
          label: "值(ms)"
          type: number
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts,
          COALESCE(${skew_threshold_ms}, 15) AS skew_threshold_ms
      ),
      video_events AS (
        SELECT s.ts, p.name AS process_name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE s.ts >= i.start_ts AND s.ts < i.end_ts
          AND s.dur > 0 AND s.name GLOB '*releaseOutputBuffer*'
      ),
      audio_events AS (
        SELECT s.ts, p.name AS process_name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE s.ts >= i.start_ts AND s.ts < i.end_ts
          AND s.dur > 0
          AND (s.name GLOB '*AudioTrack*write*' OR s.name GLOB '*AudioTrack.write*')
      ),
      paired AS (
        SELECT (v.ts - a.ts) / 1e6 AS skew_ms
        FROM video_events v
        LEFT JOIN audio_events a
          ON ABS(v.ts - a.ts) < 10000000 AND v.process_name = a.process_name
        WHERE v.process_name IS NOT NULL AND a.ts IS NOT NULL
      )
      SELECT 'P50偏差' AS metric, ROUND(PERCENTILE(ABS(skew_ms), 0.5), 2) AS value_ms FROM paired
      UNION ALL
      SELECT 'P90偏差', ROUND(PERCENTILE(ABS(skew_ms), 0.9), 2) FROM paired
      UNION ALL
      SELECT '最大偏差', ROUND(MAX(ABS(skew_ms)), 2) FROM paired
      UNION ALL
      SELECT '平均偏差', ROUND(AVG(ABS(skew_ms)), 2) FROM paired
      UNION ALL
      SELECT '样本数', CAST(COUNT(*) AS REAL) FROM paired
      UNION ALL
      SELECT '超阈值次数', CAST(SUM(CASE WHEN ABS(skew_ms) > (SELECT skew_threshold_ms FROM input) THEN 1 ELSE 0 END) AS REAL) FROM paired

output:
  format: structured
  fields:
    - name: audio_underrun_status
      description: "AudioFlinger Underrun 检测"
    - name: video_release_timing
      description: "视频帧释放时序"
    - name: av_skew_events
      description: "A/V Sync 偏差事件详情"
    - name: av_skew_summary
      description: "A/V Sync 偏差统计"

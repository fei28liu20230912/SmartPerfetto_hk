name: lock_binder_wait
version: "1.0"
type: composite
category: diagnostics
tier: B

meta:
  display_name: "锁/Binder 等待分析"
  description: "下钻 reason_code=lock_binder_wait 的帧窗口，检查主线程睡眠、唤醒链、锁竞争和同步 Binder 阻塞"
  icon: "link"
  tags: [lock, binder, blocking, wait, jank, root_cause]

triggers:
  keywords:
    zh: [锁等待, Binder 等待, lock_binder_wait, 主线程等待, 唤醒链]
    en: [lock wait, binder wait, lock_binder_wait, main thread wait, waker chain]
  patterns:
    - ".*lock_binder_wait.*"
    - ".*(锁|Binder).*(等待|阻塞).*"
    - ".*(lock|binder).*(wait|blocking).*"

prerequisites:
  required_tables:
    - thread_state
    - thread
    - process
  modules:
    - android.binder
    - android.monitor_contention
    - slices.with_context

inputs:
  - name: process_name
    type: string
    required: true
    description: "目标进程名"
  - name: start_ts
    type: timestamp
    required: true
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "分析结束时间戳(ns)"

identity:
  policy: required
  scope: process
  aliases: [process_name, package]
  rewriteTo: recommended_process_name_param

steps:
  - id: main_thread_blocking_chain
    type: skill
    skill: blocking_chain_analysis
    name: "主线程阻塞链"
    params:
      process_name: "${process_name}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    save_as: blocking_chain
    optional: true

  - id: monitor_lock_contention
    type: skill
    skill: lock_contention_in_range
    name: "锁竞争明细"
    params:
      package: "${process_name}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    save_as: lock_contention
    optional: true

  - id: sync_binder_blocking
    type: skill
    skill: binder_blocking_in_range
    name: "同步 Binder 阻塞"
    params:
      package: "${process_name}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    save_as: binder_blocking
    optional: true

synthesis:
  template: |
    lock_binder_wait 深钻已完成：
    - blocking_chain: ${blocking_chain.summary}
    - lock_contention: ${lock_contention.summary}
    - binder_blocking: ${binder_blocking.summary}
